<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFlow | Welcome</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .welcome-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-panel {
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 50px 40px;
            animation: panelSlideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .welcome-banner {
            margin-bottom: 24px; /* Reduced to fit the tagline */
        }

        .welcome-tagline {
            margin-bottom: 32px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .signin-btn-large {
            width: 100%;
            justify-content: center;
            padding: 16px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: buttonPulse 3s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        .signin-btn-large:hover {
            transform: scale(1.02) translateY(-3px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        @keyframes panelSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
            50% { box-shadow: 0 0 20px 2px rgba(139, 92, 246, 0.3); }
        }
    </style>
</head>
<body data-role="admin" data-theme="dark">

    <button class="icon-btn" id="themeBtn" title="Toggle Theme" style="position: absolute; top: 24px; right: 24px; z-index: 50;">
        <i class="fa-solid fa-sun"></i>
    </button>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="welcome-wrapper">
        <div class="panel welcome-panel">
            
            <div class="brand welcome-banner">
                <div class="brand-mark" style="width: 60px; height: 60px; font-size: 1.5rem; margin: 0 auto 15px;">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="brand-text">
                    <h1 style="font-size: 1.8rem; margin: 0;">CampusFlow</h1>
                </div>
            </div>

            <p class="welcome-tagline">
                The unified gateway for secure campus management and media sanitization.
            </p>

            <button class="primary-btn signin-btn-large" onclick="window.location.href='signin.html'">
                Sign In <i class="fa-solid fa-right-to-bracket" style="margin-left: 10px;"></i>
            </button>

        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        const updateIcon = (theme) => {
            themeBtn.innerHTML = theme === 'dark' 
                ? '<i class="fa-solid fa-sun"></i>' 
                : '<i class="fa-solid fa-moon"></i>';
        };

        updateIcon(document.body.getAttribute('data-theme'));

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            updateIcon(newTheme);
        });
    </script>
</body>
</html>
